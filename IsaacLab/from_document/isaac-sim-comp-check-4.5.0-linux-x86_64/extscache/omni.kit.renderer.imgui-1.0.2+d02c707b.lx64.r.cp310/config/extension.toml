[package]
title = "Rendering Imgui"
category = "Rendering"
version = "1.0.2"
description = "This extension subscribes to rendering events emitted from the omni.kit.renderer.core and implements an ImGUI rendering backend, i.e. it does actual windows, buttons, fonts rendering."
keywords = ["rendering", "Imgui"]
support_level = "Core"

# Location of change log file in target (final) folder of extension, relative to the root.
# More info on writing changelog: https://keepachangelog.com/en/1.0.0/
changelog="docs/CHANGELOG.md"
readme = "docs/Overview.md"

[dependencies]
"omni.appwindow" = {}
"omni.kit.renderer.core" = {}
"omni.kit.renderer.capture" = {}

[[native.library]]
"path" = "bin/deps/${lib_prefix}freetype${lib_ext}"

[[native.library]]
"path" = "bin/deps/${lib_prefix}imgui${lib_ext}"

[[python.module]]
name = "omni.kit.imgui_renderer"

[[python.module]]
name = "omni.kit.imgui"

[[native.plugin]]
path = "bin/*.plugin"

[[native.plugin]]
path = "bin/deps/carb.imgui.plugin"

[[native.plugin]]
path = "bin/deps/carb.imguizmo.plugin"

[[native.plugin]]
path = "bin/omni.ui.windowmanager.plugin"

[[native.plugin]]
path = "bin/omni.ui.glyphmanager.plugin"

# SVG dependency for the glyph manager
[[native.plugin]]
path = "bin/deps/carb.svg-nanosvg.plugin"

[settings]
exts."omni.kit.renderer.core".imgui.enableMips = false
exts."omni.kit.renderer.core".imgui.streamBufferSizeMB = 32

[[test]]
args = [
    "--/exts/omni.kit.renderer.core/autostartRenderer=false",
    "--/exts/omni.kit.renderer.core/autostartImGuiRenderer=false",
    "--/exts/omni.appwindow/autocreateAppWindow=false",
]
stdoutFailPatterns.exclude = [
    "*AppWindowImGuiContext::startup called without a valid IAppWindow*",
    "*App window is not found in kit::renderer context list*",
    "*AppWindowImGuiContext startup failed*",
]
dependencies = ["omni.kit.test_helpers_gfx"]

[[test]]
name = "large-font"
# Simulate using a large font such as Japanese with a HIDPI screen
pythonTests.exclude = [
    "*test_1000_empty_imgui_window"
]
args = [
    "--/exts/omni.kit.renderer.core/autostartRenderer=false",
    "--/exts/omni.kit.renderer.core/autostartImGuiRenderer=false",
    "--/exts/omni.appwindow/autocreateAppWindow=false",
    "--/app/font/customFontPath=${kit}/exts/omni.kit.renderer.imgui/data/tests/fonts/NotoSansJP-SemiBold.ttf",
    "--/app/font/customRegionFiles=[${kit}/exts/omni.kit.renderer.imgui/data/tests/fonts/japanese_all.txt]",
    "--/app/window/dpiScaleOverride=2.5", # Simulate typical laptop HIDPI screen scaling factor
    "--/app/font/overresolutionSize=66", # Reduce ULTRA font size to fit in single texture
]
stdoutFailPatterns.exclude = [
    "*AppWindowImGuiContext::startup called without a valid IAppWindow*",
    "*App window is not found in kit::renderer context list*",
    "*AppWindowImGuiContext startup failed*",
]
dependencies = ["omni.kit.test_helpers_gfx"]

[[test]]
name = "compatibility"
args = [
    "--/exts/omni.kit.renderer.core/autostartRenderer=false",
    "--/exts/omni.kit.renderer.core/autostartImGuiRenderer=false",
    "--/exts/omni.appwindow/autocreateAppWindow=false",
    "--/exts/omni.kit.renderer.core/compatibilityMode=true",
]
stdoutFailPatterns.exclude = [
    "*AppWindowImGuiContext::startup called without a valid IAppWindow*",
    "*App window is not found in kit::renderer context list*",
    "*AppWindowImGuiContext startup failed*",
]
dependencies = ["omni.kit.test_helpers_gfx"]

[[test]]
name = "compatibility-vk"
# We don't need to run Vulkan tests on Linux, default will be Vulkan anyway
"filter:platform"."linux-x86_64".enabled = false
"filter:platform"."linux-aarch64".enabled = false
"filter:platform"."macos-universal".enabled = false

args = [
    "--/exts/omni.kit.renderer.core/autostartRenderer=false",
    "--/exts/omni.kit.renderer.core/autostartImGuiRenderer=false",
    "--/exts/omni.appwindow/autocreateAppWindow=false",
    "--/exts/omni.kit.renderer.core/compatibilityMode=true",
    "--vulkan",
]
stdoutFailPatterns.exclude = [
    "*AppWindowImGuiContext::startup called without a valid IAppWindow*",
    "*App window is not found in kit::renderer context list*",
    "*AppWindowImGuiContext startup failed*",
]
dependencies = ["omni.kit.test_helpers_gfx"]

[[test]]
name = "no-window"
args = [
    "--/exts/omni.kit.renderer.core/autostartRenderer=false",
    "--/exts/omni.kit.renderer.core/autostartImGuiRenderer=false",
    "--/exts/omni.appwindow/autocreateAppWindow=false",
    "--no-window",
]
stdoutFailPatterns.exclude = [
    "*AppWindowImGuiContext::startup called without a valid IAppWindow*",
    "*App window is not found in kit::renderer context list*",
    "*AppWindowImGuiContext startup failed*",
]
dependencies = ["omni.kit.test_helpers_gfx"]

[[test]]
name = "compatibility-no-window"
args = [
    "--/exts/omni.kit.renderer.core/autostartRenderer=false",
    "--/exts/omni.kit.renderer.core/autostartImGuiRenderer=false",
    "--/exts/omni.appwindow/autocreateAppWindow=false",
    "--/exts/omni.kit.renderer.core/compatibilityMode=true",
    "--no-window",
]
stdoutFailPatterns.exclude = [
    "*AppWindowImGuiContext::startup called without a valid IAppWindow*",
    "*App window is not found in kit::renderer context list*",
    "*AppWindowImGuiContext startup failed*",
]
dependencies = ["omni.kit.test_helpers_gfx"]

[[test]]
name = "compatibility-vk-no-window"
# We don't need to run Vulkan tests on Linux, default will be Vulkan anyway
"filter:platform"."linux-x86_64".enabled = false
"filter:platform"."linux-aarch64".enabled = false
"filter:platform"."macos-universal".enabled = false

args = [
    "--/exts/omni.kit.renderer.core/autostartRenderer=false",
    "--/exts/omni.kit.renderer.core/autostartImGuiRenderer=false",
    "--/exts/omni.appwindow/autocreateAppWindow=false",
    "--/exts/omni.kit.renderer.core/compatibilityMode=true",
    "--vulkan",
    "--no-window",
]
stdoutFailPatterns.exclude = [
    "*AppWindowImGuiContext::startup called without a valid IAppWindow*",
    "*App window is not found in kit::renderer context list*",
    "*AppWindowImGuiContext startup failed*",
]
dependencies = ["omni.kit.test_helpers_gfx"]

[documentation]
python_api_hidden = true
cpp_api_hidden = true
pages = [
    "docs/Overview.md",
    "docs/CHANGELOG.md",
]
